name: Publish to NPM

on:
  push:
    branches:
      - main
      - master

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm install --legacy-peer-deps
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.MY_NPM_TOKEN}}
